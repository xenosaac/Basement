[package]
name = "basement"
version = "0.1.0"
authors = ["Basement"]
upgrade_policy = "compatible"

# Production addresses. `basement = "_"` → filled at publish time.
# Pyth / Wormhole / Deployer are Aptos mainnet-equivalent addresses
# (same on mainnet + testnet per Pyth docs).
[addresses]
basement = "_"
pyth = "0x7e783b349d3e89cf5931af376ebeadbfab855b3fa239b7ada8f5a92fbea6b387"
wormhole = "0x5bc11445584a763c1fa7ed39081f1b920954da14e04b32440cba863d03e19625"
deployer = "0xb31e712b26fd295357355f6845e77c888298636609e93bc9b05f0f604049f434"

[dev-addresses]
basement = "0xCAFE"

# Pin AptosFramework to the same rev Pyth uses to avoid dependency conflict.
[dependencies.AptosFramework]
git = "https://github.com/aptos-labs/aptos-core.git"
subdir = "aptos-move/framework/aptos-framework/"
rev = "6f83bc6d02207298b2dee91133d75538789bf582"

[dependencies.Pyth]
git = "https://github.com/pyth-network/pyth-crosschain.git"
subdir = "target_chains/aptos/contracts"
rev = "main"
